name: sehatak_medical
description: Medical Platform - Consultations, Pharmacy, AI Health Assistant
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  page_transition: ^2.0.9
  flutter_animate: ^4.0.0
  shimmer: ^3.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  
  # Network
  http: ^1.1.0
  connectivity_plus: ^5.0.0
  
  # JSON
  json_annotation: ^4.8.1
  
  # Maps & Location
  geolocator: ^10.1.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Charts
  fl_chart: ^0.66.0
  
  # Sharing
  share_plus: ^7.2.2
  
  # URL Launcher
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
