name: sehatak_medical
description: Medical Platform - Consultations, Pharmacy, AI Health Assistant
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  page_transition: ^2.0.9
  flutter_animate: ^4.0.0
  
  # State Management and API
  flutter_bloc: ^8.1.3
  dio: ^5.3.2
  retrofit: ^4.0.1
  json_annotation: ^4.8.1
  
  # Database
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  
  # Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.0
  
  # Payments
  flutter_stripe: ^10.1.1
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Calls
  agora_rtc_engine: ^6.2.0
  permission_handler: ^11.3.0
  
  # Images and Files
  image_picker: ^1.0.4
  file_picker: ^6.1.0
  flutter_pdfview: ^1.3.2
  
  # Analytics
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.8
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Path
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
  shimmer: ^3.0.0
  http: ^1.1.0
  url_launcher: ^6.2.0
