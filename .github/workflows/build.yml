name: Build Sehatak APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Clean and create fresh Flutter project
        run: |
          # حذف أي مجلدات قديمة تالفة
          rm -rf android ios .dart_tool build
          
          # إنشاء مشروع جديد بالكامل
          flutter create --project-name sehatak --org com.sehatak --androidx .
          
          # إنشاء main.dart بسيط يعمل
          cat > lib/main.dart << 'END'
          import 'package:flutter/material.dart';
          
          void main() => runApp(const MyApp());
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Sehatak',
                theme: ThemeData(primarySwatch: Colors.teal),
                home: const HomePage(),
              );
            }
          }
          
          class HomePage extends StatelessWidget {
            const HomePage({super.key});
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('Sehatak Medical')),
                body: const Center(child: Text('Welcome to Sehatak Medical Platform')),
              );
            }
          }
          END
          
          # التأكد من إعدادات AndroidX
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # إضافة namespace إلى build.gradle (لحل مشكلة Gradle 8)
          sed -i '/android {/a\    namespace "com.sehatak.sehatak"' android/app/build.gradle
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sehatak-apk
          path: build/app/outputs/flutter-apk/app-release.apk
