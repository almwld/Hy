name: Build Sehatak APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Create Flutter app with AndroidX
        run: |
          # إنشاء تطبيق جديد مع AndroidX
          flutter create --project-name sehatak --org com.sehatak --androidx .
          
          # إنشاء main.dart
          cat > lib/main.dart << 'END'
          import 'package:flutter/material.dart';
          void main() => runApp(const MyApp());
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Sehatak',
                theme: ThemeData(primarySwatch: Colors.teal),
                home: const Scaffold(
                  appBar: AppBar(title: Text('Sehatak')),
                  body: Center(child: Text('Welcome to Sehatak Medical')),
                ),
              );
            }
          }
          END
          
          # التأكد من إعدادات AndroidX في gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # تعطيل shrinkResources مؤقتاً لتجنب الأخطاء
          sed -i 's/shrinkResources true/shrinkResources false/' android/app/build.gradle 2>/dev/null || true
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sehatak-apk
          path: build/app/outputs/flutter-apk/app-release.apk
