name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Create android folder structure
      run: |
        mkdir -p android/app/src/main/kotlin/com/example/sehatak_medical
        mkdir -p android/app/src/main/res/values
        mkdir -p android/app/src/main/res/drawable
        mkdir -p android/gradle/wrapper
        
        cat > android/build.gradle << 'END'
        buildscript {
            ext.kotlin_version = '1.9.0'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.4.2'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.buildDir = '../build'
        subprojects {
            project.buildDir = "${rootProject.buildDir}/${project.name}"
        }
        tasks.register("clean", Delete) {
            delete rootProject.buildDir
        }
        END
        
        cat > android/app/build.gradle << 'END'
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader ->
                localProperties.load(reader)
            }
        }
        def flutterRoot = localProperties.getProperty('flutter.sdk')
        if (flutterRoot == null) {
            throw new GradleException("Flutter SDK not found")
        }
        def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
        if (flutterVersionCode == null) {
            flutterVersionCode = '1'
        }
        def flutterVersionName = localProperties.getProperty('flutter.versionName')
        if (flutterVersionName == null) {
            flutterVersionName = '1.0'
        }
        apply plugin: 'com.android.application'
        apply plugin: 'kotlin-android'
        apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
        android {
            namespace 'com.example.sehatak_medical'
            compileSdk 34
            ndkVersion flutter.ndkVersion
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            kotlinOptions {
                jvmTarget = '1.8'
            }
            sourceSets {
                main.java.srcDirs += 'src/main/kotlin'
            }
            defaultConfig {
                applicationId "com.example.sehatak_medical"
                minSdk 21
                targetSdk 34
                versionCode flutterVersionCode.toInteger()
                versionName flutterVersionName
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                }
            }
        }
        flutter {
            source '../..'
        }
        dependencies {
            implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
        }
        END
        
        cat > android/settings.gradle << 'END'
        include ':app'
        def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
        def properties = new Properties()
        assert localPropertiesFile.exists()
        localPropertiesFile.withReader("UTF-8") { reader ->
            properties.load(reader)
        }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
        END
        
        cat > android/gradle.properties << 'END'
        org.gradle.jvmargs=-Xmx1536M
        android.useAndroidX=true
        android.enableJetifier=true
        END
        
        cat > android/gradle/wrapper/gradle-wrapper.properties << 'END'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip
        END
        
        cat > android/app/src/main/AndroidManifest.xml << 'END'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="sehatak_medical"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2"/>
            </application>
        </manifest>
        END
        
        cat > android/app/src/main/res/values/styles.xml << 'END'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                <item name="android:windowBackground">@android:color/black</item>
            </style>
        </resources>
        END
        
        cat > android/app/src/main/kotlin/com/example/sehatak_medical/MainActivity.kt << 'END'
        package com.example.sehatak_medical
        import io.flutter.embedding.android.FlutterActivity
        class MainActivity: FlutterActivity()
        END
    
    - name: Clean project
      run: flutter clean
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sehatak-apk
        path: build/app/outputs/flutter-apk/app-release.apk
