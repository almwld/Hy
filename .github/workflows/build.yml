name: Build Sehatak APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Create Flutter app and fix configs
        run: |
          # حذف أي مجلدات قديمة
          rm -rf android ios .dart_tool build
          
          # إنشاء مشروع جديد
          flutter create --project-name sehatak --org com.sehatak .
          
          # إنشاء main.dart
          cat > lib/main.dart << 'END'
          import 'package:flutter/material.dart';
          void main() => runApp(const MyApp());
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Sehatak',
                theme: ThemeData(primarySwatch: Colors.teal),
                home: const Scaffold(
                  appBar: AppBar(title: Text('Sehatak')),
                  body: Center(child: Text('Welcome to Sehatak Medical')),
                ),
              );
            }
          }
          END
          
          # إضافة namespace إلى android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "android {" >> android/app/build.gradle
          echo "    namespace 'com.sehatak.sehatak'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          
          # إضافة package إلى AndroidManifest.xml
          sed -i 's/<manifest /<manifest package="com.sehatak.sehatak" /' android/app/src/main/AndroidManifest.xml
          
          # إضافة AndroidX properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sehatak-apk
          path: build/app/outputs/flutter-apk/app-release.apk
